<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pomodoro App</title>
    <link rel="stylesheet" href="./style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main class="app-container" aria-label="Pomodoro timer app">
      <h1>Pomodoro <i class="fas fa-hourglass-start" aria-hidden="true"></i></h1>
      <div class="app-message" aria-live="polite">Press start to begin</div>

      <label for="focus-input" class="sr-only">Focus task</label>
      <input id="focus-input" type="text" placeholder="What are you focusing on?" class="focus-input" />
      <label for="custom-time-input" class="sr-only">Custom duration in minutes</label>
        id="custom-time-input"
      <div class="timer-buttons" role="group" aria-label="Timer modes">
        <button type="button" data-mode="pomodoro" class="timer-mode active">Pomodoro</button>
        <button type="button" data-mode="shortBreak" class="timer-mode">Short Break</button>
        <button type="button" data-mode="longBreak" class="timer-mode">Long Break</button>
        <div class="circle-shape" aria-hidden="true">

        <div class="app-counter-box" aria-live="polite" aria-label="Countdown timer">

        <div class="controls" role="group" aria-label="Timer controls">
          <button type="button" class="btn-start"><i class="fas fa-play"></i> Start</button>
          <button type="button" class="btn-pause" disabled><i class="fas fa-pause"></i> Pause</button>
          <button type="button" class="btn-reset"><i class="fas fa-sync"></i> Reset</button>
          <button type="button" class="btn-mute" aria-pressed="false">
            <i class="fas fa-volume-up"></i> Sound On
          </button>
        </div>
    </main>
        min="1"
      />

      <div class="timer-buttons" role="group" aria-label="Timer modes">
        <button type="button" data-mode="pomodoro" class="timer-mode active">Pomodoro</button>
        <button type="button" data-mode="shortBreak" class="timer-mode">Short Break</button>
        <button type="button" data-mode="longBreak" class="timer-mode">Long Break</button>
      </div>

      <div class="app-circle">
        <div class="circle-shape" aria-hidden="true">
          <div class="semi-circle right-side circle-mask"></div>
          <div class="semi-circle right-side circle"></div>
          <div class="semi-circle left-side circle-mask"></div>
          <div class="semi-circle left-side circle"></div>
        </div>

        <div class="app-counter-box" aria-live="polite" aria-label="Countdown timer">
          <p><span class="minutes">25</span>:<span class="seconds">00</span></p>
        </div>

        <div class="controls" role="group" aria-label="Timer controls">
          <button type="button" class="btn-start"><i class="fas fa-play"></i> Start</button>
          <button type="button" class="btn-pause" disabled><i class="fas fa-pause"></i> Pause</button>
          <button type="button" class="btn-reset"><i class="fas fa-sync"></i> Reset</button>
          <button type="button" class="btn-mute" aria-pressed="false">
            <i class="fas fa-volume-up"></i> Sound On
          </button>
        </div>
      </div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
